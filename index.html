<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mis Finanzas</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <header class="topbar">
      <div>
        <h1>💰 Mis Finanzas</h1>
        <p>Control personal</p>
      </div>

      <button id="theme">🌙</button>
    </header>

    <main>
      <section class="balance-card">
        <span>Balance actual</span>

        <h2 id="balance">0 €</h2>

        <p class="trend">↑ Buen control financiero</p>
      </section>

      <section class="summary">
        <div class="money-card income">
          <span>Ingresos</span>

          <strong id="ingresos"> 0 € </strong>
        </div>

        <div class="money-card expense">
          <span>Gastos</span>

          <strong id="gastos"> 0 € </strong>
        </div>

        <div class="money-card saving">
          <span>Ahorro</span>

          <strong id="ahorro"> 0 € </strong>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>Gastos por categoría</h2>
        </div>

        <canvas id="grafico"></canvas>
      </section>

      <section class="panel">
        <h2>Últimos movimientos</h2>

        <div id="lista" class="movimientos"></div>
      </section>
    </main>

    <button class="floating-button" onclick="abrirModal()">+</button>

    <div id="modal" class="modal">
      <div class="modal-content">
        <h2>Nuevo movimiento</h2>

        <select id="tipo">
          <option value="gasto">💸 Gasto</option>

          <option value="ingreso">💰 Ingreso</option>
        </select>

        <input id="descripcion" placeholder="Descripción" />

        <input id="importe" type="number" placeholder="Importe" />

        <select id="categoria">
          <option value="Vivienda">🏠 Vivienda</option>

          <option value="Alimentación">🛒 Alimentación</option>

          <option value="Transporte">🚗 Transporte</option>

          <option value="Ocio">🎮 Ocio</option>

          <option value="Salud">💊 Salud</option>

          <option value="Otros">📦 Otros</option>
        </select>

        <div class="modal-actions">
          <button onclick="cerrarModal()">Cancelar</button>

          <button onclick="agregarMovimiento()">Guardar</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
