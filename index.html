<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mis Finanzas</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <section class="month-selector">
      <button onclick="cambiarMes(-1)">◀</button>

      <div>
        <h2 id="mes-actual">Julio 2026</h2>
      </div>

      <button onclick="cambiarMes(1)">▶</button>
    </section>

    <main>
      <button class="export-button" onclick="exportarMesPDF()">
        📄 Exportar este mes
      </button>
      <br />

      <section class="balance-card">
        <span>Balance actual</span>

        <h2 id="balance">0 €</h2>
      </section>

      <section class="summary">
        <div class="money-card income">
          <span>Ingresos</span>

          <strong id="ingresos"> 0 € </strong>
        </div>

        <div class="money-card expense">
          <span>Gastos</span>

          <strong id="gastos"> 0 € </strong>
        </div>

        <div class="money-card saving" hidden>
          <span>Ahorro</span>

          <strong id="ahorro"> 0 € </strong>
        </div>
      </section>

      <section class="panel">
        <h2>Últimos movimientos</h2>

        <div id="lista" class="movimientos"></div>
      </section>

      <section class="panel chart-panel">
        <h2>Gastos por categoría</h2>

        <div id="chart-container">
          <canvas id="grafico"></canvas>

          <div id="empty-chart">
            <div class="empty-icon">📊</div>

            <p>Aún no hay gastos registrados</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Evolución mensual</h2>

        <div id="evolution-container">
          <canvas id="grafico-evolucion"></canvas>
        </div>
      </section>
    </main>

    <button class="floating-button" onclick="abrirModal()">+</button>

    <div id="modal" class="modal">
      <div class="modal-content">
        <h2>Nuevo movimiento</h2>

        <select id="tipo">
          <option value="gasto">💸 Gasto</option>

          <option value="ingreso">💰 Ingreso</option>
        </select>

        <input id="descripcion" placeholder="Descripción" />

        <input id="importe" type="number" placeholder="Importe" />

        <select id="categoria">
          <option value="Vivienda">🏠 Vivienda</option>

          <option value="Alimentación">🛒 Alimentación</option>

          <option value="Transporte">🚗 Transporte</option>

          <option value="Ocio">🎮 Ocio</option>

          <option value="Salud">💊 Salud</option>

          <option value="Restaurantes">🍽️ Restaurantes</option>

          <option value="Otros">📦 Otros</option>
        </select>

        <div class="modal-actions">
          <button onclick="cerrarModal()">Cancelar</button>

          <button onclick="agregarMovimiento()">Guardar</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/evolution.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
